<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup S3 — Spotlight panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 40px 24px; }
        .demo-shell { max-width: 1100px; margin: 0 auto; }
        .demo-header { color: #0f172a; margin-bottom: 24px; }
        .spotlight {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 12px 32px rgba(15, 23, 42, 0.08);
            display: grid;
            grid-template-columns: 240px 1fr;
            min-height: 520px;
            overflow: hidden;
        }
        .spotlight-sidebar {
            background: #f8fafc;
            padding: 20px 16px;
            border-right: 1px solid #e2e8f0;
        }
        .spotlight-search {
            position: relative;
            margin-bottom: 20px;
        }
        .spotlight-search i {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            color: #94a3b8;
        }
        .spotlight-search input {
            width: 100%;
            padding: 10px 12px 10px 36px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 120ms;
        }
        .spotlight-search input:focus { border-color: #0d6efd; }

        .filter-section { margin-bottom: 20px; }
        .filter-title {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #94a3b8; margin-bottom: 8px;
        }
        .filter-list { display: flex; flex-direction: column; gap: 4px; }
        .filter-item {
            display: flex; align-items: center; gap: 8px;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #475569;
            cursor: pointer;
            transition: background 80ms;
        }
        .filter-item:hover { background: #e2e8f0; }
        .filter-item.active { background: #e7f1ff; color: #0d6efd; font-weight: 600; }
        .filter-item .count {
            margin-left: auto;
            font-size: 0.72rem; color: #94a3b8;
            background: #f1f5f9; padding: 1px 6px; border-radius: 999px;
        }
        .filter-item.active .count { background: #cfe2ff; color: #0a58ca; }

        .spotlight-main {
            padding: 24px 28px;
            overflow-y: auto;
        }
        .results-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .results-count {
            color: #0f172a; font-weight: 600;
        }
        .results-count small { color: #64748b; font-weight: 400; }
        .sort-select {
            font-size: 0.825rem;
            padding: 4px 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            background: #fff;
            color: #475569;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .result-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 14px;
            cursor: pointer;
            transition: all 120ms ease;
        }
        .result-card:hover {
            border-color: #0d6efd;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.08);
        }
        .result-card-header {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 10px;
        }
        .result-card-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.95rem;
        }
        .icon-pg { background: #e7f1ff; color: #0d6efd; }
        .icon-inv { background: #dcfce7; color: #166534; }
        .src-badge {
            font-size: 0.65rem; font-weight: 700;
            text-transform: uppercase;
            padding: 2px 6px; border-radius: 4px;
        }
        .src-badge.pg { background: #e7f1ff; color: #0d6efd; }
        .src-badge.inv { background: #dcfce7; color: #166534; }
        .result-name {
            font-weight: 700; font-size: 0.95rem; color: #0f172a;
            margin-bottom: 4px;
        }
        .result-cat {
            font-size: 0.78rem; color: #64748b;
            margin-bottom: 10px;
        }
        .result-price {
            font-weight: 700; color: #0d6efd;
            font-size: 1.05rem;
        }
        .result-price small { color: #94a3b8; font-weight: 400; font-size: 0.7rem; }

        .empty-state {
            text-align: center; padding: 60px 20px;
            color: #94a3b8;
        }
        .empty-state i { font-size: 2.5rem; display: block; margin-bottom: 12px; }
        .empty-state .create-btn {
            margin-top: 12px; padding: 8px 16px;
            background: #0d6efd; color: #fff; border: 0; border-radius: 8px;
            cursor: pointer; font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="demo-shell">
        <h2 class="demo-header">S3 — Spotlight panel</h2>
        <p style="color:#64748b;margin-bottom:24px">Page de recherche dédiée. Filtres à gauche, résultats en cards à droite. Style Linear / Spotlight macOS. Bon pour comparer plusieurs produits côte-à-côte.</p>

        <div class="spotlight">
            <aside class="spotlight-sidebar">
                <div class="spotlight-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="s3-input" placeholder="Rechercher…">
                </div>

                <div class="filter-section">
                    <div class="filter-title">Catalogue</div>
                    <div class="filter-list">
                        <div class="filter-item active" data-filter="all">
                            <i class="bi bi-grid"></i> Tous
                            <span class="count" id="s3-cnt-all">13</span>
                        </div>
                        <div class="filter-item" data-filter="pg">
                            <i class="bi bi-shop"></i> Généraux
                            <span class="count" id="s3-cnt-pg">8</span>
                        </div>
                        <div class="filter-item" data-filter="inv">
                            <i class="bi bi-box-seam"></i> Inventaire
                            <span class="count" id="s3-cnt-inv">5</span>
                        </div>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="filter-title">Famille</div>
                    <div class="filter-list">
                        <div class="filter-item" data-filter-fam="all">
                            <i class="bi bi-grid"></i> Toutes
                        </div>
                        <div class="filter-item" data-filter-fam="boucherie">
                            🥩 Boucherie
                        </div>
                        <div class="filter-item" data-filter-fam="epicerie">
                            🛒 Épicerie
                        </div>
                    </div>
                </div>
            </aside>

            <main class="spotlight-main">
                <div class="results-header">
                    <div class="results-count">
                        <span id="s3-result-count">13 résultats</span>
                        <small>· dans les 2 catalogues</small>
                    </div>
                    <select class="sort-select">
                        <option>Pertinence</option>
                        <option>Nom (A→Z)</option>
                        <option>Prix (croissant)</option>
                        <option>Prix (décroissant)</option>
                    </select>
                </div>
                <div class="results-grid" id="s3-grid"></div>
            </main>
        </div>
    </div>

    <script>
        const PRODUITS = [
            { src: 'pg',  name: 'Boeuf',           cat: 'Bovin',     famille: 'boucherie', prix: 4350 },
            { src: 'pg',  name: 'Boeuf En Détail', cat: 'Bovin',     famille: 'boucherie', prix: 4250 },
            { src: 'pg',  name: 'Veau',            cat: 'Bovin',     famille: 'boucherie', prix: 4600 },
            { src: 'pg',  name: 'Poulet',          cat: 'Volaille',  famille: 'boucherie', prix: 3500 },
            { src: 'pg',  name: 'Agneau',          cat: 'Ovin',      famille: 'boucherie', prix: 4500 },
            { src: 'pg',  name: 'Beurre',          cat: 'Superette', famille: 'epicerie',  prix: 500 },
            { src: 'pg',  name: 'Lait Eldorado',   cat: 'Superette', famille: 'epicerie',  prix: 350 },
            { src: 'pg',  name: 'Citron Liquide',  cat: 'Superette', famille: 'epicerie',  prix: 1200 },
            { src: 'inv', name: 'Beurre',          cat: 'Superette', famille: 'epicerie',  prix: 500 },
            { src: 'inv', name: 'Boeuf',           cat: 'Viandes',   famille: 'boucherie', prix: 4350 },
            { src: 'inv', name: 'Foie',            cat: 'Abats',     famille: 'boucherie', prix: 3000 },
            { src: 'inv', name: 'Yell',            cat: 'Abats',     famille: 'boucherie', prix: 2500 },
            { src: 'inv', name: 'Dorade',          cat: 'Superette', famille: 'epicerie',  prix: 5000 }
        ];

        let f = { src: 'all', fam: 'all', q: '' };
        const $grid = document.getElementById('s3-grid');
        const $count = document.getElementById('s3-result-count');
        const $input = document.getElementById('s3-input');

        function render() {
            let matches = PRODUITS;
            if (f.src !== 'all') matches = matches.filter(p => p.src === f.src);
            if (f.fam !== 'all') matches = matches.filter(p => p.famille === f.fam);
            if (f.q) matches = matches.filter(p => p.name.toLowerCase().includes(f.q.toLowerCase()));

            $count.textContent = `${matches.length} résultat${matches.length > 1 ? 's' : ''}`;

            if (matches.length === 0) {
                const createText = f.q ? `Créer «&nbsp;${f.q}&nbsp;»` : 'Créer un nouveau produit';
                $grid.innerHTML = `
                    <div style="grid-column:1/-1" class="empty-state">
                        <i class="bi bi-search"></i>
                        Aucun produit ne correspond aux filtres.<br>
                        <button class="create-btn" onclick="alert('Modal d\\'ajout pré-rempli')">${createText}</button>
                    </div>
                `;
                return;
            }
            $grid.innerHTML = matches.map(p => {
                const icon = p.src === 'pg' ? 'bi-shop' : 'bi-box-seam';
                const iconCls = p.src === 'pg' ? 'icon-pg' : 'icon-inv';
                const srcLabel = p.src === 'pg' ? 'Généraux' : 'Inventaire';
                return `
                    <div class="result-card" onclick="alert('Ouvrir: ${p.name} (${p.src}/${p.cat})')">
                        <div class="result-card-header">
                            <div class="result-card-icon ${iconCls}"><i class="bi ${icon}"></i></div>
                            <span class="src-badge ${p.src}">${srcLabel}</span>
                        </div>
                        <div class="result-name">${p.name}</div>
                        <div class="result-cat">${p.famille === 'boucherie' ? '🥩' : '🛒'} ${p.cat}</div>
                        <div class="result-price">${p.prix.toLocaleString('fr-FR')} <small>FCFA</small></div>
                    </div>
                `;
            }).join('');
        }

        $input.addEventListener('input', (e) => { f.q = e.target.value; render(); });
        document.querySelectorAll('[data-filter]').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('[data-filter]').forEach(x => x.classList.remove('active'));
                el.classList.add('active');
                f.src = el.dataset.filter;
                render();
            });
        });
        document.querySelectorAll('[data-filter-fam]').forEach(el => {
            el.addEventListener('click', () => {
                document.querySelectorAll('[data-filter-fam]').forEach(x => x.classList.remove('active'));
                el.classList.add('active');
                f.fam = el.dataset.filterFam;
                render();
            });
        });
        // Active "Toutes" famille by default
        document.querySelector('[data-filter-fam="all"]').classList.add('active');
        render();
    </script>
</body>
</html>
