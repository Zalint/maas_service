<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup S1 — Command Palette (⌘K)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f172a; min-height: 100vh; padding: 60px 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        .demo-hint { color: #94a3b8; text-align: center; margin-bottom: 24px; }
        .demo-hint kbd { background: #334155; padding: 2px 8px; border-radius: 4px; color: #e2e8f0; font-size: 0.8rem; }
        .palette-overlay {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            position: relative;
            padding: 40px 16px;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            min-height: 600px;
        }
        .palette {
            background: #fff;
            border-radius: 14px;
            width: 100%;
            max-width: 640px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            font-size: 0.925rem;
        }
        .palette-search {
            display: flex; align-items: center; gap: 10px;
            padding: 18px 20px;
            border-bottom: 1px solid #f1f5f9;
        }
        .palette-search i { color: #94a3b8; font-size: 1.1rem; }
        .palette-search input {
            border: 0; outline: none;
            flex: 1; font-size: 1rem; color: #0f172a;
            background: transparent;
        }
        .palette-search input::placeholder { color: #94a3b8; }
        .palette-search .kbd-esc {
            font-size: 0.7rem; color: #64748b;
            border: 1px solid #e2e8f0; padding: 1px 6px; border-radius: 4px;
        }
        .palette-results { max-height: 440px; overflow-y: auto; padding: 8px 0; }
        .palette-group-label {
            font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.06em;
            color: #94a3b8;
            padding: 10px 20px 6px;
        }
        .palette-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background 80ms;
            border-left: 3px solid transparent;
        }
        .palette-item:hover, .palette-item.active {
            background: #f1f5f9;
            border-left-color: #0d6efd;
        }
        .palette-item .item-icon {
            width: 32px; height: 32px; border-radius: 8px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .icon-pg { background: #e7f1ff; color: #0d6efd; }
        .icon-inv { background: #dcfce7; color: #166534; }
        .palette-item .item-main { flex: 1; min-width: 0; }
        .palette-item .item-name { font-weight: 600; color: #0f172a; }
        .palette-item .item-meta {
            font-size: 0.78rem; color: #64748b;
            display: flex; gap: 6px; align-items: center; margin-top: 2px;
        }
        .badge-cat {
            background: #e2e8f0; color: #475569;
            padding: 1px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 600;
        }
        .badge-cat.boucherie { background: #fee2e2; color: #991b1b; }
        .badge-cat.epicerie { background: #fef3c7; color: #854d0e; }
        .palette-item .item-price {
            font-weight: 600; color: #0f172a;
            text-align: right;
            font-size: 0.85rem;
        }
        .palette-create {
            border-top: 1px solid #f1f5f9;
            padding: 12px 20px;
            background: #fafbff;
            color: #0d6efd;
            cursor: pointer;
            display: flex; align-items: center; gap: 10px;
            font-weight: 500;
        }
        .palette-create:hover { background: #eff6ff; }
        .palette-footer {
            border-top: 1px solid #f1f5f9;
            padding: 8px 20px;
            font-size: 0.72rem; color: #94a3b8;
            display: flex; gap: 16px; justify-content: center;
        }
        .palette-footer kbd {
            background: #f1f5f9; padding: 1px 6px; border-radius: 4px;
            color: #475569; border: 1px solid #e2e8f0;
        }
        .empty-state {
            text-align: center; padding: 40px 20px;
            color: #94a3b8;
        }
        .empty-state i { font-size: 2rem; margin-bottom: 8px; }
    </style>
</head>
<body>
    <p class="demo-hint">
        S1 — Command Palette · Style <kbd>⌘K</kbd> moderne (Notion / Linear / GitHub).
        Tape quelques lettres pour filtrer. Navigation <kbd>↑</kbd> <kbd>↓</kbd> · <kbd>↵</kbd> ouvrir
    </p>

    <div class="palette-overlay">
        <div class="palette">
            <div class="palette-search">
                <i class="bi bi-search"></i>
                <input type="text" id="s1-input" placeholder="Rechercher un produit…" autofocus>
                <span class="kbd-esc">Esc</span>
            </div>
            <div class="palette-results" id="s1-results"></div>
            <div class="palette-create" id="s1-create" style="display:none">
                <i class="bi bi-plus-circle"></i>
                <span>Créer un nouveau produit «&nbsp;<strong id="s1-create-name"></strong>&nbsp;»</span>
            </div>
            <div class="palette-footer">
                <span><kbd>↑↓</kbd> naviguer</span>
                <span><kbd>↵</kbd> ouvrir</span>
                <span><kbd>Esc</kbd> fermer</span>
            </div>
        </div>
    </div>

    <script>
        // Données de démo
        const PRODUITS = [
            { src: 'pg',  name: 'Boeuf',           cat: 'Bovin',     famille: 'boucherie', prix: 4350 },
            { src: 'pg',  name: 'Boeuf En Détail', cat: 'Bovin',     famille: 'boucherie', prix: 4250 },
            { src: 'pg',  name: 'Veau',            cat: 'Bovin',     famille: 'boucherie', prix: 4600 },
            { src: 'pg',  name: 'Poulet',          cat: 'Volaille',  famille: 'boucherie', prix: 3500 },
            { src: 'pg',  name: 'Agneau',          cat: 'Ovin',      famille: 'boucherie', prix: 4500 },
            { src: 'pg',  name: 'Beurre',          cat: 'Superette', famille: 'epicerie',  prix: 500 },
            { src: 'pg',  name: 'Lait Eldorado',   cat: 'Superette', famille: 'epicerie',  prix: 350 },
            { src: 'pg',  name: 'Citron Liquide',  cat: 'Superette', famille: 'epicerie',  prix: 1200 },
            { src: 'inv', name: 'Beurre',          cat: 'Superette', famille: 'epicerie',  prix: 500 },
            { src: 'inv', name: 'Boeuf',           cat: 'Viandes',   famille: 'boucherie', prix: 4350 },
            { src: 'inv', name: 'Foie',            cat: 'Abats',     famille: 'boucherie', prix: 3000 },
            { src: 'inv', name: 'Yell',            cat: 'Abats',     famille: 'boucherie', prix: 2500 },
            { src: 'inv', name: 'Dorade',          cat: 'Superette', famille: 'epicerie',  prix: 5000 }
        ];

        const $input = document.getElementById('s1-input');
        const $results = document.getElementById('s1-results');
        const $create = document.getElementById('s1-create');
        const $createName = document.getElementById('s1-create-name');

        let activeIdx = 0;
        let currentMatches = [];

        function render(query) {
            const q = (query || '').toLowerCase().trim();
            const matches = PRODUITS.filter(p => !q || p.name.toLowerCase().includes(q));
            currentMatches = matches;

            const pg = matches.filter(p => p.src === 'pg');
            const inv = matches.filter(p => p.src === 'inv');

            let html = '';
            if (pg.length === 0 && inv.length === 0) {
                html = '<div class="empty-state"><i class="bi bi-search"></i><div>Aucun produit trouvé</div></div>';
            } else {
                if (pg.length) {
                    html += `<div class="palette-group-label">📂 Produits Généraux (${pg.length})</div>`;
                    pg.forEach((p, i) => { html += renderItem(p, i); });
                }
                if (inv.length) {
                    html += `<div class="palette-group-label">📦 Inventaire (${inv.length})</div>`;
                    inv.forEach((p, i) => { html += renderItem(p, pg.length + i); });
                }
            }
            $results.innerHTML = html;
            activeIdx = 0;
            updateActive();

            if (q && matches.length === 0) {
                $createName.textContent = query;
                $create.style.display = '';
            } else {
                $create.style.display = 'none';
            }
        }

        function renderItem(p, idx) {
            const icon = p.src === 'pg' ? 'bi-shop' : 'bi-box-seam';
            const iconCls = p.src === 'pg' ? 'icon-pg' : 'icon-inv';
            return `
                <div class="palette-item" data-idx="${idx}">
                    <div class="item-icon ${iconCls}"><i class="bi ${icon}"></i></div>
                    <div class="item-main">
                        <div class="item-name">${p.name}</div>
                        <div class="item-meta">
                            <span class="badge-cat ${p.famille}">${p.cat}</span>
                        </div>
                    </div>
                    <div class="item-price">${p.prix.toLocaleString('fr-FR')} FCFA</div>
                </div>
            `;
        }

        function updateActive() {
            const items = $results.querySelectorAll('.palette-item');
            items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
            const ac = items[activeIdx];
            if (ac) ac.scrollIntoView({ block: 'nearest' });
        }

        $input.addEventListener('input', () => render($input.value));
        $input.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx + 1, currentMatches.length - 1); updateActive(); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx - 1, 0); updateActive(); }
            else if (e.key === 'Enter') {
                const m = currentMatches[activeIdx];
                if (m) alert(`Ouvrir produit: ${m.name} (${m.src === 'pg' ? 'Produits Généraux' : 'Inventaire'} / ${m.cat})`);
            }
        });
        $results.addEventListener('click', (e) => {
            const it = e.target.closest('.palette-item');
            if (!it) return;
            const idx = parseInt(it.dataset.idx, 10);
            const m = currentMatches[idx];
            if (m) alert(`Ouvrir produit: ${m.name} (${m.src === 'pg' ? 'Produits Généraux' : 'Inventaire'} / ${m.cat})`);
        });
        $create.addEventListener('click', () => alert(`Créer "${$createName.textContent}" (ouvrirait le modal d'ajout pré-rempli)`));
        render('');
    </script>
</body>
</html>
